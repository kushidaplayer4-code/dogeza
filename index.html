<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>土下座させろ！</title>

<style>
body{
  text-align:center;
  font-family:sans-serif;
  background:#f2f2f2;
}

#game{
  margin-top:40px;
}

img{
  width:250px;
}

#tapArea{
  margin-top:20px;
  padding:30px;
  background:#ddd;
  border-radius:10px;
  font-size:24px;
}
</style>
</head>

<body>

<h1>土下座させろ！</h1>

<div id="game">

<img id="img" src="img1.jpeg">

<p>レベル: <span id="level">1</span></p>

<div id="tapArea">
連打！
</div>

</div>

<script>

let power = 0
let level = 1
let cleared = false

const img = document.getElementById("img")
const levelText = document.getElementById("level")
const tapArea = document.getElementById("tapArea")

function updateImage(){
  let newLevel = Math.min(5, Math.max(1, Math.floor(power/20)+1))
  
  if(newLevel !== level){
    level = newLevel
    img.src = "img"+level+".jpeg"
    levelText.textContent = level
  }

  if(level === 5 && !cleared){
    cleared = true
    alert("クリア！！")
  }
}

// タップ
tapArea.addEventListener("click",()=>{
  power += 6
  updateImage()
})

// 強い抵抗
setInterval(()=>{

  if(cleared) return

  power -= 4

  if(power < 0){
    power = 0
  }

  updateImage()

},100)

</script>

</body>
</html>
